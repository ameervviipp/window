<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Sheet - Series 7000</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #999; margin: 0; padding: 10px; }
        .page { background: white; width: 95%; max-width: 800px; margin: auto; padding: 15px; border: 1px solid #000; min-height: 500px; }
        
        /* الترويسة العلوية */
        .top-bar { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 10px; }
        .win-draw { width: 100px; height: 80px; border: 1px solid #000; display: flex; position: relative; }
        .win-draw div { flex: 1; border: 0.5px solid #000; background: #f0f0f0; }

        /* منطقة الإدخال - جعلتها واضحة جداً للتعديل */
        .edit-box { background: #eee; padding: 10px; border: 1px dashed #000; margin-bottom: 15px; text-align: center; }
        .edit-box input { width: 70px; padding: 8px; font-size: 18px; border: 1px solid #000; font-weight: bold; text-align: center; }

        /* الجداول - مطابقة لشكل الورقة */
        h4 { margin: 10px 0 5px 0; font-size: 14px; text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #000; padding: 5px; text-align: center; font-size: 12px; }
        th { background: #e0e0e0; }
        .res-val { font-weight: bold; font-size: 15px; background: #ffffd0; }

        /* إخفاء أدوات الإدخال عند الطباعة */
        @media print { .edit-box { display: none; } .page { border: none; width: 100%; } }
    </style>
</head>
<body>

<div class="page">
    <div class="top-bar">
        <div style="font-size: 12px;">
            <b>PROJECT: ABU ALAA</b><br>
            SERIES: 7000 SLIDING<br>
            COLOR: 7043 | DATE: 2026
        </div>
        <div class="win-draw">
            <div></div><div></div>
        </div>
    </div>

    <div class="edit-box">
        العرض (W): <input type="text" id="W" value="1750" inputmode="decimal" oninput="calculate()">
        الارتفاع (H): <input type="text" id="H" value="1190" inputmode="decimal" oninput="calculate()">
    </div>

    <h4>1. تقطيع الألمنيوم (ALU CUTTING LIST)</h4>
    <table>
        <thead>
            <tr>
                <th>الكود</th>
                <th>الوصف</th>
                <th>العدد</th>
                <th>الخصم</th>
                <th>الطول النهائي</th>
            </tr>
        </thead>
        <tbody id="alu"></tbody>
    </table>

    <h4>2. الزجاج (GLASS)</h4>
    <table>
        <thead>
            <tr>
                <th>النوع</th>
                <th>العدد</th>
                <th>W (mm)</th>
                <th>H (mm)</th>
            </tr>
        </thead>
        <tbody id="glass"></tbody>
    </table>

    <div style="font-size: 10px; margin-top: 30px; border-top: 1px solid #000;">
        * ملاحظة: يتم التحقق من القياسات قبل القص الفعلي.
    </div>
</div>

<script>
    function calculate() {
        // قراءة القيم وتحويلها لأرقام
        let w = parseFloat(document.getElementById('W').value) || 0;
        let h = parseFloat(document.getElementById('H').value) || 0;

        // الحسابات الفنية (مطابقة للورقة)
        let data = [
            {id: "03308", desc: "حلق أفقي", qty: 2, ded: "0", res: w},
            {id: "03308", desc: "حلق رأسي", qty: 2, ded: "0", res: h},
            {id: "03327", desc: "درفة طول", qty: 4, ded: "-77", res: h - 77},
            {id: "03336", desc: "درفة عرض", qty: 4, ded: "+14", res: (w / 2) + 14}
        ];

        let aluHtml = "";
        data.forEach(x => {
            aluHtml += `<tr>
                <td>${x.id}</td>
                <td>${x.desc}</td>
                <td>${x.qty}</td>
                <td>${x.ded}</td>
                <td class="res-val">${x.res.toFixed(1)}</td>
            </tr>`;
        });
        document.getElementById('alu').innerHTML = aluHtml;

        // حساب الزجاج
        let gw = ((w/2) + 14) - 95;
        let gh = (h - 77) - 95;
        document.getElementById('glass').innerHTML = `<tr><td>شفاف 6mm</td><td>2</td><td class="res-val">${gw.toFixed(1)}</td><td class="res-val">${gh.toFixed(1)}</td></tr>`;
    }

    // تشغيل تلقائي
    window.onload = calculate;
</script>

</body>
</html>
