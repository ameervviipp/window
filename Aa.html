<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة دقيقة - ورشة أبو علاء</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eee; padding: 10px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border: 2px solid #333; box-shadow: 5px 5px 0px #000; }
        .input-box { background: #fff9c4; padding: 15px; border: 1px solid #fbc02d; margin-bottom: 20px; text-align: center; }
        input { width: 100px; padding: 10px; font-size: 20px; font-weight: bold; text-align: center; border: 2px solid #000; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 12px; text-align: center; }
        th { background: #333; color: white; }
        .final { color: #e67e22; font-weight: bold; font-size: 20px; }
        .header-title { border-bottom: 2px solid #000; margin-bottom: 15px; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-title">
        <b>📐 نظام القص الدقيق (سلسلة 7000)</b><br>
        بناءً على تعليماتك الفنية
    </div>

    <div class="input-box">
        <label>العرض الكلي (W):</label><br>
        <input type="text" id="W" value="175" inputmode="decimal" oninput="calc()"><br><br>
        <label>الارتفاع الكلي (H):</label><br>
        <input type="text" id="H" value="119" inputmode="decimal" oninput="calc()">
    </div>

    <table>
        <thead>
            <tr>
                <th>القطعة</th>
                <th>العدد</th>
                <th>قياس القص</th>
            </tr>
        </thead>
        <tbody id="res"></tbody>
    </table>
</div>

<script>
    function calc() {
        let w = parseFloat(document.getElementById('W').value) || 0;
        let h = parseFloat(document.getElementById('H').value) || 0;

        // تطبيق المعادلات التي ذكرتها أنت بدقة:
        let helq_w = w - 2.6;      // عرض الحلق (175 - 2.6 = 172.4)
        let helq_h = h;            // طول الحلق يبقى كما هو
        let darfa_h = h - 7.7;     // ارتفاع الدرفة
        let darfa_w = (w - 2.8) / 2; // عرض الدرفة

        let results = [
            { name: "عرض الحلق", qty: 2, val: helq_w },
            { name: "طول الحلق", qty: 2, val: helq_h },
            { name: "ارتفاع الدرفة", qty: 4, val: darfa_h },
            { name: "عرض الدرفة", qty: 4, val: darfa_w }
        ];

        let html = "";
        results.forEach(item => {
            html += `<tr>
                <td>${item.name}</td>
                <td>${item.qty}</td>
                <td class="final">${item.val.toFixed(1)}</td>
            </tr>`;
        });
        document.getElementById('res').innerHTML = html;
    }
    window.onload = calc;
</script>

</body>
</html>
