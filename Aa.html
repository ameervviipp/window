<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>برنامج أبو علاء للألمنيوم</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background: #e0e0e0; }
        .sheet { background: white; max-width: 800px; margin: auto; padding: 20px; border: 1px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        
        /* الترويسة الهندسية */
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .window-box { width: 100px; height: 80px; border: 2px solid #333; display: flex; position: relative; }
        .pane { flex: 1; border: 1px solid #333; background: #f0f8ff; }

        /* منطقة الإدخال - جعلناها كبيرة وواضحة للهاتف */
        .input-area { background: #fff9c4; padding: 15px; border: 2px solid #fbc02d; margin: 15px 0; border-radius: 8px; }
        label { font-weight: bold; font-size: 14px; color: #333; }
        input { width: 80px; padding: 10px; font-size: 18px; font-weight: bold; border: 1px solid #000; text-align: center; margin: 0 10px; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; }
        th { background: #eee; }
        .val { color: #d32f2f; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="sheet">
    <div class="header">
        <div>
            <b>أمر إنتاج فني - ورشة أبو علاء</b><br>
            سلسلة 7000 | رمادي 7043
        </div>
        <div class="window-box">
            <div class="pane"></div>
            <div class="pane"></div>
        </div>
    </div>

    <div class="input-area">
        <label>العرض (W):</label>
        <input type="text" id="W" value="1750" inputmode="decimal" oninput="update()">
        
        <label>الارتفاع (H):</label>
        <input type="text" id="H" value="1190" inputmode="decimal" oninput="update()">
        <p style="font-size: 11px; margin: 5px 0 0 0; color: #666;">* قم بتغيير الأرقام أعلاه لتتحدث الجداول فوراً</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>الكود</th>
                <th>المقطع</th>
                <th>العدد</th>
                <th>الطول (mm)</th>
            </tr>
        </thead>
        <tbody id="aluTable"></tbody>
    </table>

    <script>
        function update() {
            let w = parseFloat(document.getElementById('W').value) || 0;
            let h = parseFloat(document.getElementById('H').value) || 0;

            // الحسابات بناءً على ورقة العمل الفنية
            let data = [
                {id: "03308", name: "حلق عرض", qty: 2, len: w},
                {id: "03308", name: "حلق طول", qty: 2, len: h},
                {id: "03327", name: "درفة طول", qty: 4, len: h - 77},
                {id: "03336", name: "درفة عرض", qty: 4, len: (w / 2) + 14}
            ];

            let html = "";
            data.forEach(item => {
                html += `<tr>
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td class="val">${item.len.toFixed(1)}</td>
                </tr>`;
            });
            document.getElementById('aluTable').innerHTML = html;
        }
        
        // تشغيل أولي
        window.onload = update;
    </script>
</div>

</body>
</html>
